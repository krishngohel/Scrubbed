<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signing you in… — Scrubbed</title>
<style>
  body{background:#F6F1E8;color:#1F1B16;font-family:"Inter Tight",system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .box{text-align:center}
  .spin{width:28px;height:28px;border:3px solid rgba(31,27,22,0.15);border-top-color:#B5563A;border-radius:50%;margin:0 auto 16px;animation:s 0.8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  p{font-size:14.5px;color:#5A544B}
  a{color:#B5563A}
</style>
</head>
<body>
<div class="box">
  <div class="spin" id="spinner"></div>
  <p id="msg">Signing you in…</p>
</div>
<script>
(function(){
  var qs = new URLSearchParams(window.location.search);
  var code = qs.get('code');
  if (code) {
    window.location.replace('/auth/oauth-callback' + window.location.search);
    return;
  }

  var params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
  var access = params.get('access_token');
  var refresh = params.get('refresh_token');
  var error = params.get('error_description') || params.get('error');
  history.replaceState(null, '', window.location.pathname);
  if (access) {
    localStorage.setItem('scrubbed_token', access);
    if (refresh) localStorage.setItem('scrubbed_refresh', refresh);
    var pending = sessionStorage.getItem('pending_checkout_plan');
    window.location.replace(pending ? '/#pricing' : '/vault');
  } else {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').innerHTML =
      (error ? ('Sign-in failed: ' + error.replace(/</g,'&lt;')) : 'Sign-in failed.') +
      '<br/><br/><a href="/">Back to home</a>';
  }
})();
</script>
</body>
</html>
