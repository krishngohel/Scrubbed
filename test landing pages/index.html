<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Scrubbed</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:#F6F1E8;color:#1F1B16;font-family:"Inter Tight",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none;cursor:pointer}
input,textarea{font:inherit;color:inherit}
em{font-family:"Newsreader",Georgia,serif;font-style:italic}
strong{font-weight:600}
:root{
  --paper:#F6F1E8;--cream:#FBF7EE;--ink:#1F1B16;--graphite:#5C544A;--stone:#A89C8A;--rule:#E5DDCD;
  --clay:#B5563A;--clay-d:#9F4C33;--clay-p:#8A412C;--clay-s:#EBD6CB;
  --moss:#5A6E4A;--moss-s:#DDE3CE;--rust:#8B3A2E;--rust-s:#EFD3CC;
  --ease:cubic-bezier(0.32,0.72,0.24,1);
}
.btn-primary{display:inline-flex;align-items:center;gap:7px;background:var(--clay);color:#FBF7EE;border-radius:8px;font-weight:600;white-space:nowrap;transition:background 160ms var(--ease)}
.btn-primary:hover{background:var(--clay-d)}
.btn-secondary{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--ink);border:1px solid var(--rule);border-radius:8px;font-weight:500;white-space:nowrap;transition:background 160ms var(--ease)}
.btn-secondary:hover{background:rgba(31,27,22,0.04)}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--graphite);border-radius:8px;font-weight:500;white-space:nowrap;transition:all 160ms var(--ease)}
.btn-ghost:hover{color:var(--ink);background:rgba(31,27,22,0.05)}
.btn-lg{height:50px;padding:0 22px;font-size:15px}
.btn-md{height:44px;padding:0 18px;font-size:14px}
.btn-sm{height:36px;padding:0 14px;font-size:13px}
.btn-xs{height:28px;padding:0 10px;font-size:12px}

.nav{position:sticky;top:0;z-index:100;background:rgba(246,241,232,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule)}
.nav--app{background:rgba(251,247,238,0.92)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:60px;display:flex;align-items:center;gap:28px}
.wordmark{font-family:"Newsreader",serif;font-style:italic;font-weight:500;font-size:24px;letter-spacing:-0.01em;color:var(--ink);cursor:pointer;flex-shrink:0}
.nav-links{display:flex;gap:24px;flex:1}
.nav-link{font-size:14px;color:var(--graphite);transition:color 140ms var(--ease);white-space:nowrap}
.nav-link:hover,.nav-link.is-active{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:13px;color:var(--graphite)}
.nav-avatar{width:32px;height:32px;border-radius:999px;background:var(--clay);color:#FBF7EE;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}

.hero{padding:64px 32px 56px}
.hero-inner{max-width:1100px;margin:0 auto;text-align:center}
.hero-eyebrow{font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--graphite);margin-bottom:20px}
.hero-h1{font-family:"Newsreader",serif;font-weight:400;font-size:88px;line-height:1.0;letter-spacing:-0.028em;color:var(--ink);margin-bottom:24px}
.hero-lead{font-size:19px;line-height:1.55;color:var(--graphite);max-width:620px;margin:0 auto 32px}
.hero-ctas{display:flex;gap:10px;margin-bottom:56px;justify-content:center}
.hero-contrast{border-top:1px solid var(--rule);max-width:620px;margin:0 auto}
.hc-row{display:grid;grid-template-columns:120px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--rule);align-items:baseline;text-align:left}
.hc-from{font-family:"Newsreader",serif;font-size:19px;color:var(--ink)}
.hc-v{font-size:15px;color:var(--graphite)}
.hc-us .hc-from{color:var(--clay)}
.hc-us .hc-v{color:var(--ink)}

.hero-mockup-wrap{padding:0 32px 96px;max-width:1320px;margin:0 auto}
.mockup-shell{width:100%;border-radius:16px;border:1px solid var(--rule);box-shadow:0 4px 12px rgba(31,27,22,0.05),0 40px 80px rgba(31,27,22,0.14);overflow:hidden;background:var(--cream)}
.mockup-chrome{height:40px;padding:0 16px;display:flex;align-items:center;gap:8px;background:#EFE8DA;border-bottom:1px solid var(--rule)}
.dot{width:11px;height:11px;border-radius:999px;display:inline-block}
.dot-r{background:#ED6A5E}.dot-y{background:#F5C14D}.dot-g{background:#61C454}
.mockup-url{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--stone);margin-left:14px;letter-spacing:0.01em}
.mockup-body{display:flex;height:600px}
.mock-sidebar{width:224px;border-right:1px solid var(--rule);background:#EFE8DA;padding:20px 12px;display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.mock-logo{font-family:"Newsreader",serif;font-style:italic;font-size:19px;color:var(--ink);padding:6px 12px;margin-bottom:18px;letter-spacing:-0.01em}
.mock-sidebar-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--stone);padding:10px 12px 6px}
.mock-nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;font-size:13px;color:var(--graphite);transition:all 140ms;text-align:left}
.mock-nav-item svg{color:var(--stone);flex-shrink:0}
.mock-nav-item.is-active{background:var(--cream);color:var(--ink);font-weight:500;box-shadow:0 1px 2px rgba(31,27,22,0.04)}
.mock-nav-item.is-active svg{color:var(--clay)}
.mock-nav-count{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--stone);font-weight:400}
.mock-main{flex:1;overflow:hidden;padding:28px 36px;display:flex;flex-direction:column;gap:22px;background:var(--paper)}
.mock-header-row{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
.mock-eyebrow{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:var(--graphite);margin-bottom:6px}
.mock-title{font-family:"Newsreader",serif;font-size:32px;line-height:1.05;color:var(--ink);letter-spacing:-0.02em}
.mock-stats{display:flex;gap:28px}
.mock-stat{text-align:left}
.mock-stat-n{font-family:"Newsreader",serif;font-size:24px;line-height:1;color:var(--ink);margin-bottom:4px;letter-spacing:-0.01em}
.mock-stat-l{font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--graphite);font-weight:500}
.mock-sections{display:flex;flex-direction:column;gap:18px;overflow:hidden}
.mock-section{}
.mock-sec-head{padding:0 2px 10px;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.mock-sec-title{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.mock-sec-title svg{color:var(--clay)}
.mock-sec-count{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--stone);font-weight:400}
.mock-sec-meta{font-size:11px;color:var(--graphite);font-variant-numeric:tabular-nums}
.mock-sec-meta strong{color:var(--ink);font-weight:600;font-family:"JetBrains Mono",monospace;font-size:11px}
.mock-sec-body{border:1px solid var(--rule);border-radius:10px;overflow:hidden;background:var(--cream)}
.mock-row{display:grid;grid-template-columns:14px 1fr auto 96px;gap:14px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--rule);transition:background 120ms}
.mock-row:last-child{border-bottom:none}
.mock-row.is-selected{background:var(--clay-s)}
.mock-row-bullet{width:6px;height:6px;border-radius:999px;background:var(--stone)}
.mock-row.is-selected .mock-row-bullet{background:var(--clay)}
.mock-row-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.005em}
.mock-row-sub{font-size:11.5px;color:var(--graphite);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mock-row-meta{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--graphite);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.mock-row-meta strong{color:var(--ink);font-weight:600}
.mock-tag{font-size:10.5px;font-weight:500;padding:3px 9px;border-radius:999px;text-align:center;white-space:nowrap;letter-spacing:0.01em}
.mock-tag--clay{background:var(--clay-s);color:var(--clay-p)}
.mock-tag--moss{background:var(--moss-s);color:var(--moss)}
.mock-tag--neutral{background:var(--rule);color:var(--graphite)}
.mock-tag--amber{background:#F4E3C4;color:#8A5A1A}

.how{padding:80px 32px;background:var(--cream);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.how-inner{max-width:1200px;margin:0 auto}
.how-head{margin-bottom:48px}
.section-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--graphite);margin-bottom:12px}
.section-h2{font-family:"Newsreader",serif;font-weight:400;font-size:48px;line-height:1.05;letter-spacing:-0.02em;color:var(--ink)}
.how-stages{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.stage{padding:36px 28px;border:1px solid var(--rule);border-radius:12px;background:var(--paper);transition:box-shadow 180ms}
.stage--active{background:var(--cream);box-shadow:0 4px 16px rgba(31,27,22,0.07)}
.stage-n{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--graphite);margin-bottom:18px}
.stage-label{font-family:"Newsreader",serif;font-size:22px;line-height:1.25;color:var(--ink);margin-bottom:10px}
.stage-sub{font-size:14px;line-height:1.6;color:var(--graphite)}

.feature{padding:96px 32px}
.feature-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1.1fr;gap:72px;align-items:start}
.feature-h2{font-family:"Newsreader",serif;font-weight:400;font-size:44px;line-height:1.1;letter-spacing:-0.015em;color:var(--ink);margin:12px 0 20px}
.feature-p{font-size:16px;line-height:1.65;color:var(--graphite);margin-bottom:28px;max-width:420px}
.feature-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.feature-list li{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--ink)}
.feature-list li svg{color:var(--moss);flex-shrink:0}

.outline-card{background:var(--cream);border:1px solid var(--rule);border-radius:14px;box-shadow:0 4px 12px rgba(31,27,22,0.05),0 16px 40px rgba(31,27,22,0.07);overflow:hidden}
.outline-card-header{padding:20px 22px 18px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.oc-eyebrow{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--graphite);margin-bottom:4px}
.oc-title{font-family:"Newsreader",serif;font-size:20px;color:var(--ink)}
.oc-badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:var(--rule);color:var(--graphite);white-space:nowrap;flex-shrink:0;margin-top:4px}
.oc-sources{padding:16px 22px;border-bottom:1px solid var(--rule)}
.oc-sources-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--stone);margin-bottom:10px}
.oc-source{display:grid;grid-template-columns:10px 1fr;gap:10px;align-items:start;padding:8px 0;border-bottom:1px dashed var(--rule)}
.oc-source:last-child{border-bottom:none;padding-bottom:0}
.oc-dot{width:6px;height:6px;border-radius:999px;background:var(--clay);margin-top:7px;flex-shrink:0}
.oc-src-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.oc-src-note{font-size:12px;color:var(--graphite)}
.oc-outline{padding:16px 22px;display:flex;flex-direction:column}
.oc-beat{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:10px 0;border-bottom:1px solid var(--rule)}
.oc-beat:last-child{border-bottom:none}
.oc-beat-n{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--stone);padding-top:2px}
.oc-beat-t{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.oc-beat-d{font-size:12px;color:var(--graphite);line-height:1.5}

.quote-section{padding:96px 32px;background:var(--ink)}
.quote-inner{max-width:900px;margin:0 auto}
.q-kicker{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--stone);margin-bottom:24px}
.q-text{font-family:"Newsreader",serif;font-style:italic;font-size:40px;line-height:1.25;letter-spacing:-0.01em;color:var(--cream);font-weight:400;margin-bottom:24px}
.q-attr{font-size:14px;color:var(--stone)}

.pricing{padding:96px 32px}
.pricing-inner{max-width:1200px;margin:0 auto}
.pricing-inner .section-h2{margin:12px 0 48px}
.pricing-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:760px}
.price-card{background:var(--cream);border:1px solid var(--rule);border-radius:14px;padding:32px;display:flex;flex-direction:column;gap:16px}
.price-card--featured{border-color:var(--clay);box-shadow:0 4px 16px rgba(181,86,58,0.1)}
.price-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--graphite)}
.price-amt{font-family:"Newsreader",serif;font-size:56px;line-height:1;color:var(--ink);letter-spacing:-0.02em}
.price-sub{font-size:14px;color:var(--graphite)}
.price-list{list-style:none;display:flex;flex-direction:column;gap:10px;flex:1}
.price-list li{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink)}
.price-list li svg{color:var(--moss);flex-shrink:0}

.footer{padding:40px 32px;border-top:1px solid var(--rule)}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.footer-links{display:flex;gap:24px;flex:1}
.footer-links a{font-size:13px;color:var(--graphite)}
.footer-links a:hover{color:var(--ink)}
.footer-legal{font-size:12px;color:var(--stone)}

.app-shell{min-height:100vh;background:var(--paper)}
.app-main{max-width:1200px;margin:0 auto;padding:48px 32px}

.record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.page-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--graphite);margin-bottom:6px}
.page-h1{font-family:"Newsreader",serif;font-weight:400;font-size:52px;line-height:1.0;letter-spacing:-0.02em;color:var(--ink);margin-bottom:8px}
.page-sub{font-size:13px;color:var(--graphite)}
.record-list{background:var(--cream);border:1px solid var(--rule);border-radius:12px;box-shadow:0 1px 3px rgba(31,27,22,0.04),0 4px 12px rgba(31,27,22,0.04);overflow:hidden}
.record-row{width:100%;display:grid;grid-template-columns:1fr 80px 130px 36px;align-items:center;gap:20px;padding:20px 24px;text-align:left;border-bottom:1px solid var(--rule);transition:background 120ms var(--ease)}
.record-row:last-child{border-bottom:none}
.record-row:hover{background:rgba(31,27,22,0.02)}
.rr-name{font-family:"Newsreader",serif;font-size:20px;color:var(--ink);margin-bottom:3px}
.rr-sub{font-size:13px;color:var(--graphite)}
.rr-hrs{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink);text-align:right}
.rr-hrs span{color:var(--graphite);font-size:11px}
.rr-tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px;text-align:center}
.rr-tag--clay{background:var(--clay-s);color:var(--clay-p)}
.rr-tag--neutral{background:var(--rule);color:var(--graphite)}
.rr-edit{color:var(--stone);display:flex;align-items:center;justify-content:flex-end}

.back-btn{font-size:13px;color:var(--graphite);margin-bottom:28px;display:block}
.back-btn:hover{color:var(--ink)}
.act-head{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--rule)}
.act-eyebrow{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--graphite);margin-bottom:6px}
.act-h1{font-family:"Newsreader",serif;font-weight:400;font-size:44px;line-height:1.05;letter-spacing:-0.02em;color:var(--ink);margin-bottom:14px}
.act-meta{display:flex;gap:24px;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--graphite)}
.act-meta strong{font-weight:600;color:var(--ink)}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:32px;max-width:720px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:500;color:var(--graphite)}
.field input{background:transparent;border:none;border-bottom:1px solid var(--rule);padding:9px 2px;outline:none;font-size:15px;color:var(--ink);transition:border-color 160ms var(--ease)}
.field input:focus,.field input.is-focus{border-bottom:1.5px solid var(--clay)}
.act-section{margin-bottom:24px;max-width:720px}
.act-label{display:flex;gap:8px;align-items:baseline;font-size:13px;font-weight:500;color:var(--graphite);margin-bottom:8px}
.act-label-hint{font-size:12px;color:var(--stone);font-weight:400}
textarea{width:100%;font-family:inherit;font-size:15px;line-height:1.55;color:var(--ink);background:var(--cream);border:1px solid var(--rule);border-radius:8px;padding:14px 16px;outline:none;resize:vertical;transition:border-color 160ms var(--ease)}
textarea:focus{border-color:var(--clay)}
.char-counter{display:flex;justify-content:space-between;font-size:12px;color:var(--stone);margin-top:6px;font-family:"JetBrains Mono",monospace}
.char-counter .over{color:var(--rust)}
.act-actions{display:flex;gap:10px;padding-top:8px}

.sec-layout{display:grid;grid-template-columns:260px 1fr;gap:28px;align-items:start}
.sec-sidebar{background:var(--cream);border:1px solid var(--rule);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(31,27,22,0.04)}
.sec-sidebar-head{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--graphite);border-bottom:1px solid var(--rule);margin-bottom:8px}
.sec-item{width:100%;text-align:left;padding:11px 10px;border-radius:8px;transition:background 120ms var(--ease);border-bottom:1px solid var(--rule)}
.sec-item:last-child{border-bottom:none}
.sec-item:hover{background:rgba(31,27,22,0.03)}
.sec-item.is-active{background:var(--clay-s)}
.sec-item-name{font-family:"Newsreader",serif;font-size:17px;color:var(--ink);margin-bottom:3px}
.sec-item-sub{font-size:12px;color:var(--graphite)}
.ws-head{padding-bottom:22px;border-bottom:1px solid var(--rule);margin-bottom:28px}
.ws-title{font-family:"Newsreader",serif;font-weight:400;font-size:38px;line-height:1.1;letter-spacing:-0.015em;color:var(--ink);margin:6px 0 14px}
.ws-meta{display:flex;gap:8px}
.ws-badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:var(--rule);color:var(--graphite)}
.ws-badge--moss{background:var(--moss-s);color:var(--moss)}
.ws-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:40px}
.ws-col{display:flex;flex-direction:column}
.ws-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--graphite);margin-bottom:10px}
.prompt-card{background:var(--cream);border:1px solid var(--rule);border-radius:8px;padding:16px 18px;font-family:"Newsreader",serif;font-style:italic;font-size:16px;line-height:1.6;color:var(--ink)}
.ws-sources{display:flex;flex-direction:column}
.ws-source{display:grid;grid-template-columns:12px 1fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--rule)}
.ws-source:last-child{border-bottom:none}
.ws-dot{width:6px;height:6px;border-radius:999px;background:var(--clay);margin-top:8px}
.ws-src-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px}
.ws-src-note{font-size:12px;color:var(--graphite)}
.ws-outline{background:var(--cream);border:1px solid var(--rule);border-radius:8px;overflow:hidden}
.ws-beat{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:14px 16px;border-bottom:1px solid var(--rule)}
.ws-beat:last-child{border-bottom:none}
.ws-beat-n{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--stone);padding-top:2px}

              <div className="ws-col">
                <div className="ws-label">Your draft</div>
                <textarea className="ws-textarea" value={draft} onChange={e=>setDraft(e.target.value)} placeholder="The writing is yours. Start anywhere — the outline is a scaffold, not a script." rows={14}/>
                <div className="char-counter">
                  <span>Aim for {school.prompt.limit - 50}–{school.prompt.limit} words</span>
                  <span className={wc > school.prompt.limit ? 'over' : ''}>{wc} / {school.prompt.limit}</span>
                </div>
                <div className="act-actions">
                  <button className="btn-primary btn-sm">{IC.check} Save draft</button>
                  <button className="btn-ghost btn-sm">Regenerate outline</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('marketing');
  const [act, setAct] = useState(null);
  if (view === 'marketing') return <Marketing onEnter={()=>setView('record')}/>;
  return (
    <div className="app-shell">
      <AppNav view={view} setView={(v)=>{ setView(v); setAct(null); }}/>
      {view === 'record' && !act && <RecordView onSelect={(a)=>{ setAct(a); setView('activity'); }}/>}
      {view === 'activity' && act && <ActivityView act={act} onBack={()=>{ setAct(null); setView('record'); }}/>}
      {view === 'secondaries' && <SecView/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
