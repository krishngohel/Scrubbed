[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EMAIL_HOST"

[functions]
  node_bundler = "esbuild"

# Static URL aliases — served by Netlify CDN, no function needed
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/earlyaccess"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/secondaries"
  to = "/secondaries.html"
  status = 200

# API routes → Express function
# Without force = true, Netlify serves real files directly and only
# falls through to the function when no matching file exists.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
