[build]
  functions = "netlify/functions"
  command = "npm run build"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EMAIL_HOST,EMAIL_USER"

[functions]
  node_bundler = "esbuild"

# Clean URLs — rewrite to static files (address bar stays extensionless)
[[redirects]]
  from = "/early-access"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/secondaries"
  to = "/secondaries.html"
  status = 200

[[redirects]]
  from = "/vault"
  to = "/vault.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/cycle"
  to = "/dashboard"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset-password.html"
  status = 200

# Legacy .html URLs → canonical paths
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/landing.html"
  to = "/early-access"
  status = 301

[[redirects]]
  from = "/vault.html"
  to = "/vault"
  status = 301

[[redirects]]
  from = "/secondaries.html"
  to = "/secondaries"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/reset-password.html"
  to = "/reset-password"
  status = 301

[[redirects]]
  from = "/earlyaccess"
  to = "/early-access"
  status = 301

# Block server source from static publish (must be before API catch-all)
[[redirects]]
  from = "/server.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/supabase.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/mailer.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/db.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/routes/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/middleware/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/functions/*"
  to = "/404"
  status = 404
  force = true

# API routes → Express function
# Without force = true, Netlify serves real files directly and only
# falls through to the function when no matching file exists.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
