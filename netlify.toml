[build]
  functions = "netlify/functions"
  command = "npm run build"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EMAIL_HOST,EMAIL_USER"

[functions]
  node_bundler = "esbuild"

# Clean URLs — rewrite to static files (address bar stays extensionless)
[[redirects]]
  from = "/early-access"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/secondaries"
  to = "/secondaries.html"
  status = 200

[[redirects]]
  from = "/vault"
  to = "/vault.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/cycle"
  to = "/dashboard"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset-password.html"
  status = 200

# Legacy .html URLs → canonical paths
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/landing.html"
  to = "/early-access"
  status = 301

[[redirects]]
  from = "/vault.html"
  to = "/vault"
  status = 301

[[redirects]]
  from = "/secondaries.html"
  to = "/secondaries"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/reset-password.html"
  to = "/reset-password"
  status = 301

[[redirects]]
  from = "/earlyaccess"
  to = "/early-access"
  status = 301

# Block server source from static publish (must be before API catch-all)
[[redirects]]
  from = "/server.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/supabase.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/mailer.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/db.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/routes/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/middleware/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/functions/*"
  to = "/404"
  status = 404
  force = true

# API routes → Express function (force so POST/PATCH aren't dropped)
[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/me"
  to = "/.netlify/functions/api/me"
  status = 200
  force = true

[[redirects]]
  from = "/files/*"
  to = "/.netlify/functions/api/files/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/vault/*"
  to = "/.netlify/functions/api/vault/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/stripe/*"
  to = "/.netlify/functions/api/stripe/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/schools/*"
  to = "/.netlify/functions/api/schools/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/outlines/*"
  to = "/.netlify/functions/api/outlines/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/tracker/*"
  to = "/.netlify/functions/api/tracker/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/lor/*"
  to = "/.netlify/functions/api/lor/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/.netlify/functions/api/tools/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/cycle-ai/*"
  to = "/.netlify/functions/api/cycle-ai/:splat"
  status = 200
  force = true

# Static files first; fall through to Express for anything else
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
